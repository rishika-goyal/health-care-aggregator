<!DOCTYPE html>
<html>

<head>
    <title>Health Aggregator Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Health Aggregator Dashboard</h1>

    <div class="card">

        <h2>Service Health Status</h2>

        <p>Status: <span id="status">Loading...</span></p>

        <p>Uptime: <span id="uptime">Loading...</span></p>

        <p>Memory Usage: <span id="memory">Loading...</span></p>

        <p>Last Checked: <span id="time">Loading...</span></p>

        <button onclick="checkHealth()">Check Health</button>

    </div>


    <h2>Health History</h2>

<table border="1" id="logTable">

<tr>
<th>Status</th>
<th>Memory</th>
<th>Time</th>
</tr>

</table>

    <script src="script.js"></script>

</body>

</html>
